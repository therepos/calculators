<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculators</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700;9..40,800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111117;
  --surface:#1a1a24;
  --surface-hover:#22222e;
  --yellow:#FFE600;
  --yellow-dim:rgba(255,230,0,.08);
  --gray:#64646e;
  --gray-light:#9e9eaa;
  --text:#e8e8f0;
  --border:#2a2a36;
  --sans:'DM Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  -webkit-font-smoothing:antialiased;
}

/* Grain overlay */
body::before{
  content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
  opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* Header */
.header{
  padding:56px 32px 40px;
  max-width:740px;
  margin:0 auto;
  width:100%;
}
.header h1{
  font-size:32px;
  font-weight:800;
  letter-spacing:-.04em;
  line-height:1.1;
  margin-bottom:8px;
}
.header h1 span{
  color:var(--yellow);
}
.header p{
  font-size:14px;
  color:var(--gray-light);
  font-weight:400;
  line-height:1.55;
  max-width:480px;
}
.count{
  display:inline-block;
  margin-top:12px;
  font-family:var(--mono);
  font-size:11px;
  color:var(--gray);
  letter-spacing:.04em;
  text-transform:uppercase;
}

/* Grid */
.grid{
  max-width:740px;
  margin:0 auto;
  padding:0 32px 72px;
  width:100%;
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}

/* Card */
.card{
  display:flex;
  align-items:center;
  gap:18px;
  padding:20px 24px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  text-decoration:none;
  color:var(--text);
  transition:border-color .2s,background .2s,transform .15s;
  animation:cardIn .4s ease both;
}
.card:hover{
  border-color:var(--yellow);
  background:var(--surface-hover);
  transform:translateY(-1px);
}
.card:active{transform:translateY(0)}

@keyframes cardIn{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

/* Icon */
.card-icon{
  flex-shrink:0;
  width:44px;
  height:44px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  font-weight:700;
  font-family:var(--mono);
  letter-spacing:-.03em;
  color:var(--bg);
  background:var(--yellow);
}

/* Info */
.card-info{flex:1;min-width:0}
.card-info h2{
  font-size:15px;
  font-weight:700;
  letter-spacing:-.015em;
  margin-bottom:3px;
  line-height:1.2;
}
.card-info p{
  font-size:12px;
  color:var(--gray-light);
  font-weight:400;
  line-height:1.45;
}

/* Arrow */
.card-arrow{
  color:var(--gray);
  font-size:18px;
  transition:color .2s,transform .2s;
  flex-shrink:0;
}
.card:hover .card-arrow{
  color:var(--yellow);
  transform:translateX(4px);
}

/* States */
.loading,.empty{
  text-align:center;
  padding:48px 32px;
  color:var(--gray);
  font-size:13px;
}
.loading::after{
  content:'';display:block;width:20px;height:20px;margin:16px auto 0;
  border:2px solid var(--border);border-top-color:var(--yellow);border-radius:50%;
  animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Footer */
.footer{
  margin-top:auto;
  padding:28px 32px;
  text-align:center;
  font-size:11px;
  color:var(--gray);
  border-top:1px solid var(--border);
  letter-spacing:.02em;
}
.footer a{color:var(--gray-light);text-decoration:none;transition:color .15s}
.footer a:hover{color:var(--yellow)}

/* Responsive */
@media(max-width:480px){
  .header{padding:40px 20px 28px}
  .header h1{font-size:26px}
  .grid{padding:0 20px 56px}
  .card{padding:16px 18px;gap:14px}
  .card-icon{width:38px;height:38px;font-size:14px}
}
</style>
</head>
<body>

<div class="header">
  <h1>Finance <span>Calculators</span></h1>
  <p>Quick modelers and calculators for engagement economics, SaaS metrics, lease accounting, and more.</p>
  <span class="count" id="count"></span>
</div>

<div class="grid" id="grid">
  <div class="loading" id="loading">Loading calculators…</div>
</div>

<div class="footer">Built for practitioners — not for profit.</div>

<script>
(async () => {
  const grid = document.getElementById("grid");
  const loading = document.getElementById("loading");
  const count = document.getElementById("count");

  // Generate a short abbreviation from a title
  function abbrev(title) {
    const words = title.replace(/[^a-zA-Z0-9\s]/g, "").trim().split(/\s+/);
    if (words.length === 1) return words[0].substring(0, 3).toUpperCase();
    return words.map(w => w[0]).join("").substring(0, 3).toUpperCase();
  }

  try {
    const res = await fetch("/api/apps");
    if (!res.ok) throw new Error(res.statusText);
    const apps = await res.json();

    loading.remove();

    if (!apps.length) {
      grid.innerHTML = '<div class="empty">No calculators yet. Drop HTML files into <code>apps/</code> to get started.</div>';
      return;
    }

    count.textContent = `${apps.length} tool${apps.length === 1 ? "" : "s"}`;

    apps.forEach((app, i) => {
      const a = document.createElement("a");
      a.href = app.href;
      a.className = "card";
      a.style.animationDelay = `${i * 60}ms`;

      const iconColor = app.accent || "#FFE600";
      a.innerHTML = `
        <div class="card-icon" style="background:${iconColor}">${abbrev(app.title)}</div>
        <div class="card-info">
          <h2>${app.title}</h2>
          ${app.description ? `<p>${app.description}</p>` : ""}
        </div>
        <span class="card-arrow">→</span>
      `;
      grid.appendChild(a);
    });
  } catch (e) {
    // Fallback: if no API (e.g. local dev), show a static message
    loading.textContent = "Could not load app list. Make sure the API route is deployed.";
    console.error("Failed to load apps:", e);
  }
})();
</script>
</body>
</html>
