<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Calculators</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,700;9..40,800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--dark:#1A1A24;--dark2:#2E2E38;--yellow:#FFE600;--gray:#747480;--gray-light:#A0A0AC;--light:#F4F4F9;--card:#FFFFFF;--border:#DCDCE4;--sans:'DM Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace}
body{font-family:var(--sans);background:var(--dark);color:#fff;min-height:100vh;display:flex;flex-direction:column}

/* Header */
.hd{padding:48px 32px 36px;max-width:720px;margin:0 auto;width:100%}
.hd h1{font-size:28px;font-weight:800;letter-spacing:-.03em;line-height:1.15;margin-bottom:6px}
.hd h1 span{color:var(--yellow)}
.hd p{font-size:14px;color:var(--gray-light);font-weight:400;line-height:1.5;max-width:460px}

/* Grid */
.grid{max-width:720px;margin:0 auto;padding:0 32px 64px;width:100%;display:grid;grid-template-columns:1fr;gap:12px}

/* Card */
.crd{display:flex;align-items:center;gap:16px;padding:18px 22px;background:var(--dark2);border:1px solid transparent;border-radius:10px;text-decoration:none;color:#fff;transition:border-color .15s,background .15s}
.crd:hover{border-color:var(--yellow);background:#252530}
.crd .ico{flex-shrink:0;width:42px;height:42px;border-radius:8px;background:var(--yellow);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--dark);font-weight:800;font-family:var(--mono);letter-spacing:-.04em}
.crd .info{flex:1;min-width:0}
.crd .info h2{font-size:15px;font-weight:700;letter-spacing:-.01em;margin-bottom:2px}
.crd .info p{font-size:12px;color:var(--gray-light);font-weight:400;line-height:1.4}
.crd .arr{color:var(--gray);font-size:18px;transition:color .15s,transform .15s}
.crd:hover .arr{color:var(--yellow);transform:translateX(3px)}

/* Footer */
.ft{margin-top:auto;padding:24px 32px;text-align:center;font-size:11px;color:var(--gray);border-top:1px solid var(--dark2)}
.ft a{color:var(--gray-light);text-decoration:none}.ft a:hover{color:var(--yellow)}
</style>
</head>
<body>

<div class="hd">
  <h1>Finance <span>Calculators</span></h1>
  <p>Quick tools for engagement economics, SaaS metrics, lease accounting, and more.</p>
</div>

<div class="grid">
  <a href="/apps/engeconomics.html" class="crd">
    <div class="ico">EE</div>
    <div class="info">
      <h2>Engagement Economics</h2>
      <p>Plan budgets, track ETC, and monitor NSR, ANSR, EAF, margin, and NUI in real time.</p>
    </div>
    <span class="arr">→</span>
  </a>

  <!-- Add more cards as you build calculators: -->
  <!--
  <a href="/apps/saas.html" class="crd">
    <div class="ico">S$</div>
    <div class="info">
      <h2>SaaS Metrics</h2>
      <p>ARR, MRR, churn, LTV, CAC — key SaaS unit economics at a glance.</p>
    </div>
    <span class="arr">→</span>
  </a>

  <a href="/apps/leases.html" class="crd">
    <div class="ico">L</div>
    <div class="info">
      <h2>Lease Calculator</h2>
      <p>IFRS 16 / ASC 842 lease liability and right-of-use asset schedules.</p>
    </div>
    <span class="arr">→</span>
  </a>
  -->
</div>

<div class="ft">Built for practitioners — not for profit. <a href="https://github.com">View on GitHub</a></div>

</body>
</html>
