<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Praxis</title>
<meta name="description" content="Quick tools.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&family=Roboto:wght@300;400;500&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f9fa;
  --surf:#ffffff;
  --surf2:#f1f3f4;
  --ol:#e8eaed;
  --ol2:#dadce0;
  --t1:#202124;
  --t2:#5f6368;
  --t3:#80868b;
  --blue:#1a73e8;
  --blue-c:#d3e3fd;
  --blue-dk:#1557b0;
  --fs:'Google Sans','Roboto',system-ui,sans-serif;
  --fb:'Roboto',system-ui,sans-serif;
  --fm:'Roboto Mono','Consolas',monospace;
}
html{scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--bg);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased;font-size:14px}

/* ── APP BAR ── */
.bar{
  position:sticky;top:0;z-index:100;
  height:56px;background:var(--surf);
  border-bottom:1px solid var(--ol);
  display:flex;align-items:center;padding:0 24px;gap:16px;
}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;color:var(--t1)}
.brand-mark{width:22px;height:22px;border-radius:5px;background:var(--t1)}
.brand-name{font-family:var(--fs);font-size:15px;font-weight:600;letter-spacing:-.2px}
.sp{flex:1}
.search{
  position:relative;width:260px;max-width:40vw;
}
.search input{
  width:100%;height:34px;border:1px solid var(--ol);border-radius:8px;
  background:var(--surf);padding:0 12px 0 34px;
  font-family:var(--fb);font-size:13px;color:var(--t1);outline:none;
  transition:border-color .15s,box-shadow .15s;
}
.search input::placeholder{color:var(--t3)}
.search input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,115,232,.12)}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}
.kbd{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-family:var(--fm);font-size:10px;color:var(--t3);background:var(--surf2);padding:2px 6px;border-radius:4px;pointer-events:none}
.search input:focus ~ .kbd,.search input:not(:placeholder-shown) ~ .kbd{display:none}
.link{font-family:var(--fs);font-size:13px;color:var(--t2);text-decoration:none;padding:6px 10px;border-radius:6px;transition:background .15s,color .15s}
.link:hover{background:var(--surf2);color:var(--t1)}

/* ── CONTENT ── */
.wrap{max-width:880px;margin:0 auto;padding:48px 24px 72px}

/* Title row */
.head{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:24px}
.title{font-family:var(--fs);font-size:28px;font-weight:500;letter-spacing:-.5px;color:var(--t1)}
.meta{font-family:var(--fm);font-size:11px;color:var(--t3)}

/* Filter */
.filters{display:flex;align-items:center;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.chip{
  font-family:var(--fs);font-size:13px;font-weight:500;color:var(--t2);
  padding:6px 12px;border-radius:6px;cursor:pointer;user-select:none;
  transition:background .15s,color .15s;border:none;background:none;
}
.chip:hover{background:var(--surf2);color:var(--t1)}
.chip.on{background:var(--t1);color:var(--surf)}
.chip.on:hover{background:var(--t1);color:var(--surf)}

/* List */
.list{border-top:1px solid var(--ol)}
.row{
  display:flex;align-items:center;gap:16px;
  padding:16px 8px;border-bottom:1px solid var(--ol);
  text-decoration:none;color:var(--t1);
  transition:background .12s;
  animation:up .25s ease both;
}
.row:hover{background:var(--surf)}
@keyframes up{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.r-main{display:flex;align-items:baseline;gap:14px;min-width:0;flex:1}
.r-title{font-family:var(--fs);font-size:15px;font-weight:500;color:var(--t1);white-space:nowrap;flex-shrink:0}
.r-desc{font-size:13px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.r-cat{font-family:var(--fs);font-size:12px;color:var(--t3);flex-shrink:0;text-transform:capitalize}
.r-arr{color:var(--t3);flex-shrink:0;transition:color .12s,transform .12s}
.row:hover .r-arr{color:var(--blue);transform:translateX(2px)}

/* States */
.state{padding:60px 8px;text-align:center;color:var(--t2)}
.state .si{font-size:13px;color:var(--t2)}
.state .sh{font-size:12px;color:var(--t3);margin-top:6px}
.loader{display:inline-block;width:14px;height:14px;border:2px solid var(--ol2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Footer */
.foot{
  border-top:1px solid var(--ol);background:var(--surf);
  padding:16px 24px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  font-family:var(--fs);font-size:12px;color:var(--t3);
}
.foot a{color:var(--t2);text-decoration:none;transition:color .15s}
.foot a:hover{color:var(--blue)}
.foot .fr{display:flex;gap:16px}

@media(max-width:680px){
  .bar{padding:0 16px;gap:10px}
  .search{width:200px}
  .wrap{padding:32px 16px 48px}
  .title{font-size:24px}
  .r-desc{display:none}
  .head{flex-wrap:wrap}
}
@media(max-width:440px){
  .search{display:none}
  .foot{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<header class="bar">
  <a href="/" class="brand">
    <div class="brand-mark"></div>
    <span class="brand-name">Praxis</span>
  </a>
  <div class="sp"></div>
  <div class="search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Search tools" autocomplete="off" spellcheck="false">
    <span class="kbd">⌘K</span>
  </div>
  <a href="https://github.com" target="_blank" rel="noopener" class="link">GitHub</a>
</header>

<main class="wrap">
  <div class="head">
    <h1 class="title">Quick tools</h1>
    <span class="meta" id="meta"></span>
  </div>
  <div class="filters" id="filters"></div>
  <div class="list" id="list">
    <div class="state"><span class="loader"></span>Loading</div>
  </div>
</main>

<footer class="foot">
  <span>Built for practitioners.</span>
  <div class="fr">
    <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>
    <a href="#">MIT</a>
  </div>
</footer>

<script>
(()=>{
  const list=document.getElementById('list'),
        filters=document.getElementById('filters'),
        meta=document.getElementById('meta'),
        si=document.getElementById('search');

  let apps=[],cat='all',q='';

  // ⌘K / Ctrl-K → focus search
  document.addEventListener('keydown',e=>{
    if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();si.focus();si.select()}
    if(e.key==='Escape'&&document.activeElement===si){si.blur()}
  });

  const normCat=c=>(c||'').trim().toLowerCase()||'other';
  const filtered=()=>apps.filter(a=>{
    const c=normCat(a.category),qq=q.trim().toLowerCase();
    return(cat==='all'||c===cat)
      &&(!qq||a.title.toLowerCase().includes(qq)
        ||(a.description||'').toLowerCase().includes(qq)
        ||c.includes(qq));
  });

  function renderFilters(){
    const counts={all:apps.length};
    apps.forEach(a=>{const c=normCat(a.category);counts[c]=(counts[c]||0)+1});
    const order=['all',...Object.keys(counts).filter(k=>k!=='all').sort()];
    filters.innerHTML=order.map(k=>
      `<button class="chip${k===cat?' on':''}" data-cat="${k}">${k.charAt(0).toUpperCase()+k.slice(1)}</button>`
    ).join('');
    filters.querySelectorAll('.chip').forEach(b=>b.addEventListener('click',()=>{
      cat=b.dataset.cat;renderFilters();renderList();
    }));
  }

  function renderList(){
    const rows=filtered();
    if(!apps.length){
      list.innerHTML='<div class="state"><div class="si">No tools found.</div><div class="sh">Drop an .html file into /apps and it will appear here.</div></div>';
      meta.textContent='';return;
    }
    if(!rows.length){
      list.innerHTML='<div class="state"><div class="si">No tools match.</div><div class="sh">Try a different filter or search.</div></div>';
      meta.textContent='0 of '+apps.length;return;
    }
    list.innerHTML=rows.map((a,i)=>{
      const c=normCat(a.category);
      return `<a class="row" href="${a.href}" style="animation-delay:${i*25}ms">
        <div class="r-main">
          <span class="r-title">${a.title}</span>
          ${a.description?`<span class="r-desc">${a.description}</span>`:''}
        </div>
        <span class="r-cat">${c}</span>
        <svg class="r-arr" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </a>`;
    }).join('');
    meta.textContent=rows.length===apps.length
      ?`${apps.length} tool${apps.length!==1?'s':''}`
      :`${rows.length} of ${apps.length}`;
  }

  si.addEventListener('input',e=>{q=e.target.value;renderList()});

  (async()=>{
    try{
      const r=await fetch('apps/manifest.json',{cache:'no-cache'});
      if(!r.ok)throw new Error();
      apps=await r.json();
      // sort: category then title
      apps.sort((a,b)=>{
        const ca=normCat(a.category),cb=normCat(b.category);
        if(ca!==cb)return ca.localeCompare(cb);
        return a.title.localeCompare(b.title);
      });
      renderFilters();renderList();
    }catch{
      list.innerHTML='<div class="state"><div class="si">Could not load tools.</div><div class="sh">Check that apps/manifest.json exists.</div></div>';
    }
  })();
})();
</script>
</body>
</html>
