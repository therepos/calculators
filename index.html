<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Praxis</title>
<meta name="description" content="Tools for practitioners.">
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&family=Google+Sans+Display:wght@400;500&family=Roboto:wght@300;400;500&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1a73e8;--primary-c:#d3e3fd;--surface:#fff;
  --sv:#f1f3f4;--sc:#f8f9fa;--sch:#f1f3f4;
  --ol:#dadce0;--olv:#e8eaed;
  --t1:#202124;--t2:#5f6368;--t3:#80868b;
  --fd:'Google Sans Display',sans-serif;
  --fs:'Google Sans','Roboto',sans-serif;
  --fb:'Roboto',sans-serif;
  --fm:'Roboto Mono',monospace;
}
html{scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--sc);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased}
.app-bar{position:sticky;top:0;z-index:200;height:64px;background:var(--surface);border-bottom:1px solid var(--olv);display:flex;align-items:center;padding:0 24px;gap:16px}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.brand-mark{width:36px;height:36px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--fs);font-size:14px;font-weight:600;flex-shrink:0}
.brand-name{font-family:var(--fd);font-size:22px;font-weight:400;color:var(--t1);letter-spacing:-0.3px}
.search-wrap{flex:1;max-width:560px;margin:0 auto;position:relative}
.search-input{width:100%;height:44px;border:none;border-radius:99px;background:var(--sch);padding:0 44px;font-family:var(--fb);font-size:14px;color:var(--t1);outline:none;transition:background .2s,box-shadow .2s}
.search-input::placeholder{color:var(--t2)}
.search-input:focus{background:var(--surface);box-shadow:0 1px 3px rgba(0,0,0,.1),0 0 0 1px var(--ol)}
.si,.sc-btn{position:absolute;top:50%;transform:translateY(-50%);display:flex;align-items:center;justify-content:center;color:var(--t2);pointer-events:none}
.si{left:13px}
.sc-btn{right:10px;pointer-events:auto;background:none;border:none;cursor:pointer;padding:4px;border-radius:50%;display:none;transition:background .15s}
.sc-btn:hover{background:var(--sch)}
.sc-btn.show{display:flex}
.icon-btn{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--t2);text-decoration:none;background:none;border:none;cursor:pointer;transition:background .15s;flex-shrink:0}
.icon-btn:hover{background:var(--sch)}
.hero{background:var(--surface);border-bottom:1px solid var(--olv);padding:52px 24px 44px;text-align:center}
.hero h1{font-family:var(--fd);font-size:clamp(32px,5vw,52px);font-weight:400;color:var(--primary);letter-spacing:-.5px;line-height:1.1;margin-bottom:8px}
.hero p{font-size:16px;font-weight:300;color:var(--t2)}
.content{max-width:1060px;margin:0 auto;padding:28px 24px 80px}
.filter-row{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;height:32px;padding:0 16px;border-radius:8px;border:1px solid var(--ol);background:var(--surface);font-family:var(--fs);font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;transition:all .15s;user-select:none;white-space:nowrap}
.chip:hover{background:var(--primary-c);border-color:var(--primary);color:var(--primary)}
.chip.active{background:var(--primary-c);border-color:var(--primary);color:var(--primary);font-weight:600}
.chip.active::before{content:'✓ ';font-size:11px}
.f-sp{flex:1}
.rc{font-family:var(--fm);font-size:12px;color:var(--t3)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.card{background:var(--surface);border:1px solid var(--olv);border-radius:16px;overflow:hidden;text-decoration:none;color:var(--t1);display:flex;flex-direction:column;transition:box-shadow .2s,border-color .2s;animation:up .3s ease both}
.card:hover{box-shadow:0 1px 3px rgba(0,0,0,.07),0 4px 14px rgba(0,0,0,.07);border-color:var(--ol)}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.c-stripe{height:4px;width:100%;flex-shrink:0}
.c-body{padding:18px 20px 14px;flex:1;display:flex;flex-direction:column}
.c-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
.c-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:11px;font-weight:500;color:#fff;flex-shrink:0}
.c-arr{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--sc);color:var(--t2);transition:background .15s,color .15s;flex-shrink:0;margin-top:2px}
.card:hover .c-arr{background:var(--primary-c);color:var(--primary)}
.c-title{font-family:var(--fs);font-size:15px;font-weight:500;color:var(--t1);margin-bottom:6px;line-height:1.3}
.c-desc{font-size:13px;color:var(--t2);line-height:1.55;flex:1;font-weight:300}
.c-foot{display:flex;align-items:center;justify-content:space-between;padding:10px 20px 14px;border-top:1px solid var(--olv);margin-top:12px}
.c-tag{font-family:var(--fm);font-size:11px;color:var(--t3);background:var(--sc);padding:3px 8px;border-radius:4px}
.c-cta{font-family:var(--fs);font-size:12px;font-weight:500;color:var(--primary);opacity:0;transition:opacity .15s}
.card:hover .c-cta{opacity:1}
.loading{grid-column:1/-1;text-align:center;padding:80px 24px;color:var(--t2);font-size:14px}
.bar{width:48px;height:4px;border-radius:2px;background:var(--olv);margin:16px auto 0;overflow:hidden;position:relative}
.bar::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:var(--primary);animation:p 1.4s ease-in-out infinite}
@keyframes p{0%{left:-100%}100%{left:100%}}
.empty{grid-column:1/-1;text-align:center;padding:60px 24px}
.ei{font-size:40px;opacity:.3;margin-bottom:10px}
.et{font-size:15px;color:var(--t2)}
.eh{font-size:13px;color:var(--t3);margin-top:6px}
.footer{border-top:1px solid var(--olv);background:var(--surface)}
.footer-inner{max-width:1060px;margin:0 auto;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.ft{font-size:13px;color:var(--t3)}
.flinks{display:flex;gap:16px}
.fl{font-size:13px;color:var(--t2);text-decoration:none;transition:color .15s}
.fl:hover{color:var(--primary)}
@media(max-width:680px){.app-bar{padding:0 16px;gap:10px}.hero{padding:40px 16px 36px}.content{padding:20px 16px 60px}.footer-inner{flex-direction:column;align-items:flex-start;padding:16px}}
@media(max-width:440px){.grid{grid-template-columns:1fr}.brand-name{font-size:20px}}
</style>
</head>
<body>

<header class="app-bar">
  <a href="/" class="brand">
    <div class="brand-mark">Px</div>
    <span class="brand-name">Praxis</span>
  </a>
  <div class="search-wrap">
    <span class="si"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
    <input type="text" class="search-input" id="search" placeholder="Search tools…" autocomplete="off" spellcheck="false">
    <button class="sc-btn" id="sc" aria-label="Clear"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
  </div>
  <a href="https://github.com" target="_blank" rel="noopener" class="icon-btn" title="GitHub">
    <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
  </a>
</header>

<div class="hero">
  <h1>Praxis</h1>
  <p>Tools for practitioners.</p>
</div>

<main class="content">
  <div class="filter-row" id="fr">
    <div class="chip active" data-cat="all">All</div>
    <div class="chip" data-cat="finance">Finance</div>
    <div class="chip" data-cat="operations">Operations</div>
    <div class="chip" data-cat="utilities">Utilities</div>
    <div class="f-sp"></div>
    <span class="rc" id="rc"></span>
  </div>
  <div class="grid" id="grid">
    <div class="loading"><div>Loading…</div><div class="bar"></div></div>
  </div>
</main>

<footer class="footer">
  <div class="footer-inner">
    <span class="ft">Built for practitioners — not for profit.</span>
    <div class="flinks">
      <a href="https://github.com" target="_blank" rel="noopener" class="fl">GitHub</a>
      <a href="#" class="fl">MIT License</a>
    </div>
  </div>
</footer>

<script>
(()=>{
  const grid=document.getElementById('grid'),rc=document.getElementById('rc'),
        si=document.getElementById('search'),sc=document.getElementById('sc'),
        fr=document.getElementById('fr');
  const CAT={dcfmodel:'finance',engeconomics:'operations',leases:'finance',saas:'finance',vaultmerge:'utilities'};
  const PAL=['#1a73e8','#34a853','#ea4335','#9334e6','#e8710a','#24c1e0','#0d652d'];
  const abbr=t=>{const w=t.replace(/[^a-zA-Z0-9\s]/g,'').trim().split(/\s+/);return(w.length===1?w[0].slice(0,3):w.map(x=>x[0]).join('').slice(0,3)).toUpperCase()};
  const rgba12=h=>{if(!h||!h.startsWith('#'))return'rgba(26,115,232,0.12)';const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},0.12)`};
  let apps=[],cat='all',q='';
  const filtered=()=>apps.filter(a=>{const c=CAT[a.slug]||'utilities',qq=q.trim().toLowerCase();return(cat==='all'||c===cat)&&(!qq||a.title.toLowerCase().includes(qq)||(a.description||'').toLowerCase().includes(qq))});
  function render(){
    const list=filtered();grid.innerHTML='';
    if(!list.length){grid.innerHTML='<div class="empty"><div class="ei">🔍</div><div class="et">No tools found</div><div class="eh">Try a different search or filter</div></div>';rc.textContent='';return}
    rc.textContent=list.length+' tool'+(list.length!==1?'s':'');
    list.forEach((app,i)=>{
      const c=CAT[app.slug]||'utilities',bg=app.accent||PAL[i%PAL.length],a=document.createElement('a');
      a.href=app.href;a.className='card';a.style.animationDelay=i*45+'ms';
      a.innerHTML=`<div class="c-stripe" style="background:${bg}"></div><div class="c-body"><div class="c-top"><div class="c-icon" style="background:${bg};box-shadow:0 3px 10px ${rgba12(bg)}">${abbr(app.title)}</div><div class="c-arr"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M7 7h10v10"/></svg></div></div><div class="c-title">${app.title}</div>${app.description?`<div class="c-desc">${app.description}</div>`:''}</div><div class="c-foot"><span class="c-tag">${c}</span><span class="c-cta">Open →</span></div>`;
      grid.appendChild(a);
    });
  }
  fr.querySelectorAll('.chip').forEach(b=>b.addEventListener('click',()=>{cat=b.dataset.cat;fr.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));b.classList.add('active');render()}));
  si.addEventListener('input',e=>{q=e.target.value;sc.classList.toggle('show',!!q);render()});
  sc.addEventListener('click',()=>{si.value=q='';sc.classList.remove('show');si.focus();render()});
  (async()=>{try{const r=await fetch('apps/manifest.json');if(!r.ok)throw new Error();apps=await r.json();render()}catch{grid.innerHTML='<div class="loading">Could not load tools.</div>'}})();
})();
</script>
</body>
</html>
